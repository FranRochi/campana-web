name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy on server
        run: |
          (
            flock -x 9
            cd ~/apps/campana
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            CAMPANA_DEPLOY_LOCK_HELD=1 ./deploy.sh
          ) 9>/tmp/campana-deploy.lock
